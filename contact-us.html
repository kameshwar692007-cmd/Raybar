        content="We sell amazing solar-powered power banks at affordable prices across different ranges. Discover the perfect power bank for your needs!">

<style>
    * {
        margin: 0px;
        color: rgb(245, 245, 245);

    }

    body {
        background-image: url(formbg2.jpg);
        background-repeat: repeat;
        background-size: auto;
        background-position: center;
        min-height: 100vh;
    }

    NAV {
        background: linear-gradient(135deg, #5372ff 20%, #16002c);
        box-shadow: 3PX 3px 5px 0 rgba(155, 144, 144, 0.827),

    }

    NAV UL {
        width: 100%;
        list-style: none;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 10px;
    }

    NAV LI {
        height: 50px;
    }

    NAV A {
        color: #ffffff;
        HEIGHT: 100%;
        PADDING: 0 30PX;
        text-decoration: none;
        display: flex;
        align-items: center;

    }



    nav li:first-child {
        margin-right: auto;
        font-size: 3em;

    }


    .sidebar {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 250px;
        z-index: 999;
        background-color: rgba(0, 0, 0, 0.733);
        backdrop-filter: blur(10px);
        box-shadow: -10px 0 -10px rgba(0, 0, 0, 0.114);
        display: none;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
    }

    .sidebar li {
        width: 100%;
    }

    .sidebar a {
        width: 100%
    }

    .menu {
        display: none;
    }

    a {
        font-family: Arial, Helvetica, sans-serif;
    }

    a:hover {
        color: aqua;
        transform: scale(1.05);
        transition: transform 0.3s;
    }

    @media(max-width:800px) {
        .hideonmobile {
            display: none;
        }

        .menu {
            display: block;
        }

    }

    @media(max-width:400px) {
        .sidebar {
            width: 100%;
        }

    }

    .logbox {
        padding: 70px;
        background: transparent;
        border: 2px solid rgb(112, 201, 226);
        width: fit-content;
        height: fit-content;
        margin: 5% auto 15% auto;
        border-radius: 40px;
        backdrop-filter: blur(100px);



    }

    .input,
    .op {
        font-family: sans-serif;

    }



    .logbox input {
        border: none;
        background: transparent;
        outline: none;
        border-bottom: 2px solid rgb(255, 255, 255);
    }

    .des,
    .comp,
    .sol {
        width: 100%;
        padding: 10px;
        background-color: rgb(255, 249, 249);
        border: none;
        border-bottom: 2px solid rgb(255, 255, 255);
        color: rgb(23, 23, 23);
    }

    .op {
        font-size: 1em;
        color: black;
    }

    button {
        width: 100px;
        padding: 12px;
        background: #667eea;
        color: white;
        border-color: rgb(255, 255, 255);
        border-radius: 5px;
        border: 1px solid;
        cursor: pointer;
        margin-top: 10px;
        font-weight: 600;
        margin-left: 30px;
    }

    button:hover {
        background-color: white;
        color: #667eea;
        transition: 0.5s;
        transform: scale(1.11);
        transition: transform 0.3s;
    }

    h1 {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 3em;
        margin-left: 5px;
    }
</style>

<body>

        <nav>

                                d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
                        </svg></a></li>
                <li id="h"><a href="home.html">HOME</a></li>
                <li id="h"><a href="view.html">PRODUCTS</a></li>
                <li id="h"><a href="add-to-cart.html">ADD TO CART</a></li>
                <li id="h"><a href="prices.html">OFFERS</a></li>
                <li id="h"><a href="review.html">REVIEWS</a></li>
                <li id="h"><a href="contact-us.html">CONTACT US</a></li>
                <li id="h"><a href="login.html">SIGNOUT</a></li>
            </ul>
            <ul>
                <li class="hh"><a href="about-us.html">RAYBAR</a></li>
                <li id="h" class="hideonmobile"><a href="home.html">HOME</a></li>
                <li id="h" class="hideonmobile"><a href="view.html">PRODUCTS</a></li>
                <li id="h" class="hideonmobile"><a href="add-to-cart.html">ADD TO CART</a></li>
                <li id="h" class="hideonmobile"><a href="prices.html">OFFERS</a></li>
                <li id="h" class="hideonmobile"><a href="review.html">REVIEWS</a></li>
                <li id="h" class="hideonmobile"><a href="contact-us.html">CONTACT US</a></li>
                <li id="h" class="hideonmobile"><a href="login.html">SIGNOUT</a></li>
                <li class="menu" onclick=showsidebar()><a href="#"><svg xmlns="http://www.w3.org/2000/svg" height="26px"

                        </svg></a></li>
            </ul>
        </nav>
    </section>
    <hr>

    <form class="logbox" id="form">
        <label class="input" for="name">Full Name:</label><br>
        <input type="text" id="demo" name="name"><br><br>

        <label class="input" for="email">Email:</label><br>
        <input id="e" type="email" name="email"><br><br>

        <label class="input" for="phone">Phone Number:</label><br>
        <input id="phn" type="tel" name="phone"><br><br>

        <label class="input" for="order">Order ID:</label><br>
        <input id="od" type="text" name="order"><br><br>

        <label class="input">Complaint Category:</label><br>
        <select name="category" class="comp">
            <option class="op">Damaged Product</option>
            <option class="op">Wrong Item Delivered</option>
            <option class="op">Late Delivery</option>
            <option class="op">Missing Items</option>
            <option class="op">Quality Issue</option>
            <option class="op">Refund Issue</option>
            <option class="op">Other</option>
        </select><br><br>

        <label class="input">Describe Your Issue:</label><br>
        <textarea id="txt" name="details" rows="5" col="30" class="des"></textarea><br><br>

        <label class="input">Preferred Resolution:</label><br>
        <select name="resolution" class="sol">
            <option class="op">Refund</option>
            <option class="op">Replacement</option>
            <option class="op">Return & Pickup</option>
            <option class="op">Just Feedback</option>
        </select><br><br>
        <button id="submit" type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>
    <script>
        let form = document.getElementById("form");
        let n = document.getElementById("demo");
        let em = document.getElementById("e");
        let phn = document.getElementById("phn");
        let od = document.getElementById("od");
        let txt = document.getElementById("txt");
        let s = document.getElementById("submit");

        s.addEventListener("click", function (e) {
            e.preventDefault();

            if (n.value === "") {
                alert("Name cannot be empty");
            }
            else if (!em.value.includes("@email.com") && !em.value.includes("@gmail.com")) {
                alert("Enter a valid email or gmail");
            }
            else if (phn.value.length < 10 || phn.length > 10) {
                alert("Enter a valid phone number");
            }
            else if (od.value.length < 4 || od.value.length > 4) {
                alert("Enter a valid order number (A order number is 4 digits long)");
            }
            else if (txt.value === "") {
                alert("Please give a short description of your issue");
            }
            else {
                confirm("All fields are entered perfectly! We will reach out to you as soon as possible");
            }
        });
        function showsidebar() {
            document.querySelector('.sidebar').style.display = 'flex';
        }
        function hidesidebar() {
            document.querySelector('.sidebar').style.display = 'none';
        }
    </script>
